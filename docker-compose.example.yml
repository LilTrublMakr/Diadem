services:
  diadem:
    image: ghcr.io/liltrublmakr/pogo-map-vt:latest
    container_name: diadem
    restart: unless-stopped
    ports:
      - "${DIADEM_PORT:-3900}:3900"
    environment:
      - HOST=0.0.0.0
      - PORT=3900
      - STATS_DB_HOST=${STATS_DB_HOST:-127.0.0.1}
      - STATS_DB_PORT=${STATS_DB_PORT:-3306}
      - STATS_DB_NAME=${STATS_DB_NAME:-pokemon_stats}
      - STATS_DB_USER=${STATS_DB_USER}
      - STATS_DB_PASSWORD=${STATS_DB_PASSWORD}
      - DRAGONITE_DB_HOST=${DRAGONITE_DB_HOST:-127.0.0.1}
      - DRAGONITE_DB_PORT=${DRAGONITE_DB_PORT:-3306}
      - DRAGONITE_DB_NAME=${DRAGONITE_DB_NAME:-dragonite}
      - DRAGONITE_DB_USER=${DRAGONITE_DB_USER}
      - DRAGONITE_DB_PASSWORD=${DRAGONITE_DB_PASSWORD}
    volumes:
      # Required: Mount your config file (both paths needed for runtime and db:push)
      - ./config/config.toml:/app/build/server/config.toml:ro
      - ./config/config.toml:/app/src/lib/server/config.toml:ro
      # Optional: Persistent logs
      - diadem-logs:/app/logs
    depends_on:
      diadem-db:
        condition: service_healthy
    networks:
      - diadem-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3900').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  diadem-db:
    image: mariadb:11.4
    container_name: diadem-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme_root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-diadem}
      MARIADB_USER: ${MARIADB_USER:-diadem}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-changeme}
    volumes:
      - diadem-db-data:/var/lib/mysql
    networks:
      - diadem-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  diadem-db-data:
    name: diadem-db-data
  diadem-logs:
    name: diadem-logs

networks:
  diadem-network:
    name: diadem-network
    driver: bridge
    driver_opts:
      # mariadb gets sad if the docker network mtu is larger than the host's
      com.docker.network.driver.mtu: ${DOCKER_MTU:-1500}
